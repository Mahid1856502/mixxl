services:
  api:
    build: .
    container_name: mixxl-api
    restart: unless-stopped
    # Host network bypasses broken docker-proxy/iptables on some AlmaLinux VPS installs.
    # Nginx should proxy_pass http://127.0.0.1:5000
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "5000"
      SERVE_STATIC: "false"
